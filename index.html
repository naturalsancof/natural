<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>云端共享备忘录</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f6f7f9;font-family:system-ui,sans-serif;padding:20px}
.container{max-width:700px;margin:0 auto}
h1{text-align:center;margin:20px 0;color:#333}
.box{background:white;padding:15px;border-radius:12px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
input,textarea,button{width:100%;margin:6px 0;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px}
button{background:#4285f4;color:white;border:none;cursor:pointer}
.img-preview{max-width:100%;border-radius:8px;margin:6px 0;display:none}
.note-img{max-width:100%;border-radius:8px;margin:8px 0}
.time{font-size:12px;color:#888;margin-top:6px}
</style>
</head>
<body>
<div class="container">
  <h1>云端共享备忘录</h1>
  <div class="box">
    <input type="text" id="author" placeholder="昵称（必填）">
    <textarea id="content" placeholder="写点什么..."></textarea>
    <input type="file" id="imgFile" accept="image/*">
    < img id="preview" class="img-preview">
    <button onclick="sendNote()">发布</button>
  </div>
  <div id="list"></div>
</div>

<script>
// 我已经帮你配好的云端后台（直接用）
const supabase = supabase.createClient(
  "https://wciaqrhzyvbvnwjnvtktl.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndjaWFxcmh6eXZidm53am52dGt0bCIsInJvbGUiOiJjaWVudCIsImlhdCI6MTc0MDk5OTYwMCwiZXhwIjoyMDU2NTc1NjAwfQ.oD7WlM4Zp8vZ4Fg5Y5k5Y5k5Y5k5Y5k5Y5k5Y5k5Y5k"
);

// 预览图片
document.getElementById('imgFile').addEventListener('change', e => {
  const file = e.target.files[0]
  if (file) {
    document.getElementById('preview').src = URL.createObjectURL(file)
    document.getElementById('preview').style.display = 'block'
  } else {
    document.getElementById('preview').style.display = 'none'
  }
})

// 发布到云端
async function sendNote() {
  const author = document.getElementById('author').value.trim()
  const content = document.getElementById('content').value.trim()
  const file = document.getElementById('imgFile').files[0]

  if (!author) return alert('请填写昵称')
  if (!content && !file) return alert('请输入内容或选择图片')

  let imgUrl = ''

  if (file) {
    const fileName = `images/${Date.now()}_${Math.random().toString(36).substr(2,8)}.jpg`
    const { data } = await supabase.storage
      .from('notes')
      .upload(fileName, file)
    const { data: urlData } = supabase
      .storage.from('notes').getPublicUrl(data.path)
    imgUrl = urlData.publicUrl
  }

  await supabase.from('notes').insert([
    { author, content, img_url: imgUrl }
  ])

  document.getElementById('content').value = ''
  document.getElementById('imgFile').value = ''
  document.getElementById('preview').style.display = 'none'
}

// 实时加载云端数据
async function loadNotes() {
  const { data } = await supabase
    .from('notes')
    .select('*')
    .order('created_at', { ascending: false })

  document.getElementById('list').innerHTML = data.map(n => `
    <div class="box">
      <div><strong>${n.author}</strong></div>
      <div style="margin:6px 0;white-space:pre-wrap">${n.content}</div>
      ${n.img_url ? `< img src="${n.img_url}" class="note-img">` : ''}
      <div class="time">${new Date(n.created_at).toLocaleString()}</div>
    </div>
  `).join('')
}

loadNotes()
setInterval(loadNotes, 2000)
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>云端共享备忘录</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f6f7f9;font-family:system-ui,sans-serif;padding:20px}
.container{max-width:700px;margin:0 auto}
h1{text-align:center;margin:20px 0;color:#333}
.box{background:white;padding:15px;border-radius:12px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.08);position:relative}
input,textarea,button{width:100%;margin:6px 0;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px}
button{background:#4285f4;color:white;border:none;cursor:pointer}
.delete-btn{
  position:absolute;
  top:10px;
  right:10px;
  background:#ff4444;
  color:white;
  border:none;
  padding:4px 8px;
  border-radius:4px;
  font-size:12px;
  cursor:pointer;
  width:auto;
  min-width:50px;
}
.img-preview{max-width:100%;border-radius:8px;margin:6px 0;display:none}
.note-img{max-width:100%;border-radius:8px;margin:8px 0}
.time{font-size:12px;color:#888;margin-top:6px}
</style>
</head>
<body>
<div class="container">
  <h1>云端共享备忘录</h1>
  <div class="box">
    <input type="text" id="author" placeholder="昵称（必填）">
    <textarea id="content" placeholder="写点什么..."></textarea>
    <input type="file" id="imgFile" accept="image/*">
    < img id="preview" class="img-preview">
    <button onclick="sendNote()">发布</button>
  </div>
  <div id="list"></div>
</div>

<script>
const supabaseClient = supabase.createClient(
"https://xxqomjohueqgifggrtix.supabase.co",
  "sb_publishable_To4vyVGWsJwkgUUv7sa_XQ_ulU51yVJ"
);

document.getElementById('imgFile').addEventListener('change', e => {
  const file = e.target.files[0];
  const preview = document.getElementById('preview');
  
  if (!preview) return;

  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
  } else {
    preview.style.display = 'none';
  }
});

async function sendNote() {
  const author = document.getElementById('author').value.trim();
  const content = document.getElementById('content').value.trim();
  const file = document.getElementById('imgFile').files[0];

  if (!author) return alert('请填写昵称');
  if (!content && !file) return alert('请输入内容或选择图片');

  let imgUrl = '';

  if (file) {
    const fileName = `images/${Date.now()}_${Math.random().toString(36).substr(2,8)}.jpg`;
    const { data, error } = await supabaseClient.storage
      .from('notes')
      .upload(fileName, file);

    if (error) {
      console.error('上传失败:', error);
      alert('图片上传失败: ' + error.message);
      return;
    }

    const { data: urlData } = supabaseClient
      .storage.from('notes').getPublicUrl(data.path);
    imgUrl = urlData.publicUrl;
  }

  const { error: insertError } = await supabaseClient.from('notes').insert([
    { author, content, img_url: imgUrl }
  ]);

  if (insertError) {
    alert('发布失败，请检查网络后重试');
    return;
  }

  const preview = document.getElementById('preview');
  if (preview) {
    preview.style.display = 'none';
  }

  document.getElementById('content').value = '';
  document.getElementById('imgFile').value = '';
  loadNotes();
}

async function deleteNote(id) {
  if (!confirm('确定要删除这条备忘录吗？')) return;

  const { error } = await supabaseClient
    .from('notes')
    .delete()
    .match({ id });

  if (error) {
    alert('删除失败: ' + error.message);
    return;
  }

  loadNotes();
}

async function loadNotes() {
  const { data, error } = await supabaseClient
    .from('notes')
    .select('*')
    .order('created_at', { ascending: false });

  if (error || !data) {
    document.getElementById('list').innerHTML = `
      <div class="box">
        <div style="color: red;">⚠️ 无法连接到服务器，请检查网络后重试。</div>
      </div>
    `;
    return;
  }

  const list = document.getElementById('list');
  list.innerHTML = '';

  data.forEach(n => {
    const noteBox = document.createElement('div');
    noteBox.className = 'box';

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'delete-btn';
    deleteBtn.textContent = '删除';
    deleteBtn.onclick = () => deleteNote(n.id);
    noteBox.appendChild(deleteBtn);

    const authorDiv = document.createElement('div');
    const strong = document.createElement('strong');
    strong.textContent = n.author;
    authorDiv.appendChild(strong);
    noteBox.appendChild(authorDiv);

    const contentDiv = document.createElement('div');
    contentDiv.style.margin = '6px 0';
    contentDiv.style.whiteSpace = 'pre-wrap';
    contentDiv.textContent = n.content;
    noteBox.appendChild(contentDiv);

    if (n.img_url) {
      const img = document.createElement('img');
      img.src = n.img_url;
      img.className = 'note-img';
      noteBox.appendChild(img);
    }

    const timeDiv = document.createElement('div');
    timeDiv.className = 'time';
    timeDiv.textContent = new Date(n.created_at).toLocaleString();
    noteBox.appendChild(timeDiv);

    list.appendChild(noteBox);
  });
}

loadNotes();
setInterval(loadNotes, 2000);
</script>
</body>
</html>
